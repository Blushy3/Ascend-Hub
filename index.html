<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascend Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --text:#f5f7fb;
  --lol-soft:#f0e2ba;
  --shadow:0 30px 80px rgba(0,0,0,.38);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  overflow:hidden;
  background:#020305;
  color:var(--text);
  font-family:'Inter',sans-serif;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.04),transparent 22%),
    linear-gradient(90deg,rgba(200,170,110,.04),transparent 32%,transparent 68%,rgba(255,70,85,.05)),
    repeating-linear-gradient(90deg,transparent 0 110px,rgba(255,255,255,.012) 110px 111px);
  opacity:0;
  transition:opacity .8s ease;
  pointer-events:none;
}
body.app-ready::before{opacity:1}
.landing{
  position:relative;
  min-height:100vh;
  display:flex;
  opacity:0;
  transform:scale(1.02);
  transition:opacity .9s ease,transform 1.1s cubic-bezier(.2,.8,.2,1);
}
body.app-ready .landing{
  opacity:1;
  transform:scale(1);
}
.landing::before{
  content:"";
  position:absolute;
  inset:18px;
  border:1px solid rgba(255,255,255,.04);
  pointer-events:none;
  z-index:2;
}
.panel{
  position:relative;
  flex:1 1 50%;
  overflow:hidden;
  border:none;
  color:inherit;
  padding:0;
  cursor:pointer;
  background:#11131c;
  transition:flex-basis .85s cubic-bezier(.2,.8,.2,1),filter .45s ease;
}
.panel:focus-visible{outline:2px solid rgba(255,255,255,.28);outline-offset:-2px}
.panel-lol{
  clip-path:polygon(0 0,100% 0,calc(100% - 26px) 100%,0 100%);
}
.panel-valorant{
  clip-path:polygon(26px 0,100% 0,100% 100%,0 100%);
}
.panel::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:2;
  transition:background .45s ease,opacity .45s ease;
}
.panel-lol::before{
  background:
    linear-gradient(180deg,rgba(6,13,22,.14),rgba(5,10,16,.88)),
    radial-gradient(circle at 34% 18%,rgba(240,226,186,.12),transparent 28%);
}
.panel-valorant::before{
  background:
    linear-gradient(180deg,rgba(18,8,12,.1),rgba(10,10,16,.9)),
    linear-gradient(135deg,rgba(255,70,85,.08),transparent 24%,transparent 82%,rgba(255,70,85,.12));
}
.panel::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg,transparent,rgba(0,0,0,.34)),
    linear-gradient(140deg,rgba(255,255,255,.04),transparent 28%,transparent 72%,rgba(255,255,255,.03));
  z-index:1;
}
.panel video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transform:scale(1.04);
  transition:opacity .55s ease,transform .75s ease,filter .45s ease;
  filter:saturate(.92) brightness(.66);
}
.panel-fallback{
  position:absolute;
  inset:0;
  z-index:0;
}
.panel-lol .panel-fallback{
  background:
    radial-gradient(circle at 30% 16%,rgba(240,226,186,.18),transparent 18%),
    radial-gradient(circle at 78% 82%,rgba(200,170,110,.12),transparent 24%),
    linear-gradient(135deg,#091120 0%,#102039 36%,#0a0f18 100%);
}
.panel-valorant .panel-fallback{
  background:
    radial-gradient(circle at 74% 16%,rgba(255,139,150,.16),transparent 20%),
    radial-gradient(circle at 20% 84%,rgba(255,70,85,.12),transparent 24%),
    linear-gradient(135deg,#160d12 0%,#19111a 34%,#0c0d14 100%);
}
.panel-content{
  position:relative;
  z-index:3;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:56px 68px;
}
.panel-lol .panel-content{
  align-items:flex-end;
  text-align:right;
}
.panel-valorant .panel-content{
  align-items:flex-start;
  text-align:left;
}
.eyebrow{
  margin-bottom:16px;
  font-size:12px;
  letter-spacing:.42em;
  text-transform:uppercase;
}
.panel-lol .eyebrow{
  font-family:'Cinzel',serif;
  color:rgba(240,226,186,.62);
}
.panel-valorant .eyebrow{
  font-family:'Orbitron',sans-serif;
  color:rgba(255,255,255,.48);
}
.game-name{
  margin:0;
  max-width:min(660px,78%);
  font-size:clamp(40px,7vw,104px);
  text-transform:uppercase;
  line-height:.9;
}
.panel-lol .game-name{
  font-family:'Cinzel',serif;
  letter-spacing:.08em;
  color:var(--lol-soft);
  text-shadow:0 0 24px rgba(200,170,110,.12);
}
.panel-valorant .game-name{
  font-family:'Orbitron',sans-serif;
  letter-spacing:.08em;
  color:#fff;
  text-shadow:0 0 24px rgba(255,70,85,.16);
}
.hint{
  margin-top:18px;
  font-size:13px;
  letter-spacing:.24em;
  text-transform:uppercase;
  color:rgba(255,255,255,.32);
  transition:color .35s ease,letter-spacing .35s ease,opacity .35s ease;
}
.panel-chrome{
  position:absolute;
  bottom:42px;
  z-index:4;
  display:flex;
  align-items:center;
  gap:12px;
  opacity:.62;
  pointer-events:none;
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
}
.panel-lol .panel-chrome{
  right:68px;
  color:rgba(240,226,186,.62);
  font-family:'Cinzel',serif;
}
.panel-lol .panel-chrome::before{
  content:"";
  width:84px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(240,226,186,.78));
}
.panel-valorant .panel-chrome{
  left:68px;
  color:rgba(255,255,255,.52);
  font-family:'Orbitron',sans-serif;
}
.panel-valorant .panel-chrome::after{
  content:"";
  width:84px;
  height:1px;
  background:linear-gradient(90deg,rgba(255,70,85,.84),transparent);
}
.center-spine{
  position:absolute;
  inset:6vh auto 6vh 50%;
  width:2px;
  transform:translateX(-50%);
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.12) 8%,rgba(255,255,255,.3) 50%,rgba(255,255,255,.12) 92%,transparent);
  z-index:5;
  pointer-events:none;
  transition:left .85s cubic-bezier(.2,.8,.2,1),top .85s cubic-bezier(.2,.8,.2,1);
}
.center-spine::before,
.center-spine::after{
  content:"";
  position:absolute;
  left:50%;
  width:1px;
  height:42%;
  transform:translateX(-50%);
  opacity:.35;
}
.center-spine::before{
  top:2%;
  background:linear-gradient(180deg,rgba(240,226,186,.72),transparent);
}
.center-spine::after{
  bottom:2%;
  background:linear-gradient(180deg,transparent,rgba(255,70,85,.78));
}
body.selection-lol .panel-lol,
body.selection-valorant .panel-valorant{flex:1 1 84%}
body.selection-lol .panel-valorant,
body.selection-valorant .panel-lol{flex:1 1 16%}
body.selection-lol .panel-valorant .panel-content,
body.selection-valorant .panel-lol .panel-content{
  transform:scale(.92);
  opacity:.78;
}
body.selection-lol .panel-lol video,
body.selection-valorant .panel-valorant video{
  opacity:1;
  transform:scale(1);
  filter:saturate(1.02) brightness(.82);
}
body.selection-lol .panel-lol::before,
body.selection-valorant .panel-valorant::before{
  background:linear-gradient(180deg,rgba(10,12,16,.08),rgba(10,12,16,.46));
}
body.selection-lol .center-spine{left:84%}
body.selection-valorant .center-spine{left:16%}
body.selection-lol .panel-lol .hint,
body.selection-valorant .panel-valorant .hint{
  color:rgba(255,255,255,.64);
  letter-spacing:.3em;
}
body.selection-lol .panel-valorant .hint,
body.selection-valorant .panel-lol .hint{opacity:.22}
.panel:hover .hint{color:rgba(255,255,255,.46)}

.gate{
  position:fixed;
  inset:0;
  z-index:50;
  display:grid;
  place-items:center;
  background:linear-gradient(180deg,#020305 0%,#000 100%);
  overflow:hidden;
  transition:opacity .9s ease,visibility .9s ease;
}
body.app-ready .gate{
  opacity:0;
  visibility:hidden;
}
.gate-grid{
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,transparent 49.9%,rgba(255,255,255,.04) 50%,transparent 50.1%),
    repeating-linear-gradient(90deg,transparent 0 110px,rgba(255,255,255,.015) 110px 111px);
  opacity:.5;
}
.gate-core{
  position:relative;
  z-index:3;
  width:min(520px,calc(100vw - 36px));
}
.login-panel{
  position:relative;
  padding:38px 30px 28px;
  border-radius:26px;
  border:1px solid rgba(255,255,255,.09);
  background:linear-gradient(180deg,rgba(12,14,22,.92),rgba(7,8,12,.97));
  box-shadow:var(--shadow);
  overflow:hidden;
  transform:translateY(18px);
  opacity:0;
  animation:panel-rise .9s cubic-bezier(.2,.8,.2,1) .12s forwards;
}
.login-panel::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top,rgba(255,255,255,.06),transparent 26%),
    linear-gradient(180deg,rgba(255,255,255,.03),transparent 32%);
  pointer-events:none;
}
.login-title{
  margin:0 0 10px;
  font-size:clamp(32px,7vw,54px);
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#fff;
  font-family:'Cinzel',serif;
  text-align:center;
}
.login-subtitle{
  margin:0 0 24px;
  color:rgba(255,255,255,.58);
  line-height:1.6;
  text-align:center;
}
.login-form{
  display:flex;
  flex-direction:column;
  gap:14px;
}
.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.field span{
  font-size:11px;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:rgba(255,255,255,.54);
}
.field input{
  width:100%;
  border:none;
  border-radius:16px;
  padding:16px 18px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font:inherit;
  outline:none;
  border:1px solid rgba(255,255,255,.08);
  transition:border-color .2s ease,background .2s ease,transform .2s ease;
}
.field input::placeholder{color:rgba(255,255,255,.28)}
.field input:focus{
  border-color:rgba(255,255,255,.22);
  background:rgba(255,255,255,.08);
  transform:translateY(-1px);
}
.login-error{
  min-height:18px;
  font-size:12px;
  color:#ffb394;
  letter-spacing:.08em;
  text-align:center;
}
.login-submit{
  margin-top:6px;
  border:none;
  border-radius:18px;
  padding:16px 20px;
  background:linear-gradient(135deg,#ffffff,#dbe6ff);
  color:#0a0c12;
  font:inherit;
  font-weight:800;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
  transition:transform .2s ease,box-shadow .25s ease;
  box-shadow:0 16px 40px rgba(255,255,255,.12);
}
.login-submit:hover{
  transform:translateY(-2px);
  box-shadow:0 22px 50px rgba(255,255,255,.15);
}
.login-submit:active{transform:translateY(0)}
body.login-leaving .gate{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
body.login-leaving .login-panel{
  animation:panel-fade .7s ease forwards;
}

@keyframes panel-rise{
  0%{opacity:0;transform:translateY(18px) scale(.96)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes panel-fade{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(24px) scale(.97)}
}

@media (max-width:900px){
  .landing{flex-direction:column}
  .panel{min-height:50vh}
  .panel-lol,.panel-valorant{clip-path:none}
  .panel-content{
    min-height:50vh;
    padding:40px 24px;
    align-items:center!important;
    text-align:center!important;
  }
  .game-name{max-width:none}
  .panel-chrome{
    left:24px!important;
    right:auto!important;
    bottom:24px;
  }
  .center-spine{
    inset:50% 0 auto 0;
    width:auto;
    height:2px;
    transform:translateY(-50%);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.12) 8%,rgba(255,255,255,.3) 50%,rgba(255,255,255,.12) 92%,transparent);
  }
  .center-spine::before,
  .center-spine::after{
    top:50%;
    width:40%;
    height:1px;
    transform:translateY(-50%);
  }
  .center-spine::before{
    left:2%;
    background:linear-gradient(90deg,rgba(240,226,186,.72),transparent);
  }
  .center-spine::after{
    left:auto;
    right:2%;
    background:linear-gradient(90deg,transparent,rgba(255,70,85,.78));
  }
  body.selection-lol .panel-lol,
  body.selection-valorant .panel-valorant{flex:1 1 76%}
  body.selection-lol .panel-valorant,
  body.selection-valorant .panel-lol{flex:1 1 24%}
  body.selection-lol .center-spine{top:76%}
  body.selection-valorant .center-spine{top:24%}
}
</style>
</head>
<body>
  <section class="gate" id="gate">
    <div class="gate-grid"></div>
    <div class="gate-core">
      <div class="login-panel">
        <h1 class="login-title">Ascend Hub</h1>
        <p class="login-subtitle">Log in once to reveal the game gateway and keep this session unlocked until the browser is closed.</p>
        <form class="login-form" id="loginForm">
          <label class="field">
            <span>Username</span>
            <input id="loginUser" name="username" type="text" autocomplete="username" placeholder="Enter your username">
          </label>
          <label class="field">
            <span>Password</span>
            <input id="loginPass" name="password" type="password" autocomplete="current-password" placeholder="Enter your password">
          </label>
          <div class="login-error" id="loginError"></div>
          <button class="login-submit" type="submit">Unlock Hub</button>
        </form>
      </div>
    </div>
  </section>

  <main class="landing">
    <button class="panel panel-lol" id="lolPanel" type="button" data-target="lol" data-open="indexlol.html" aria-label="League of Legends">
      <div class="panel-fallback"></div>
      <video id="lolTrailer" muted loop playsinline preload="metadata">
        <source src="Trailer/lol.mp4" type="video/mp4">
        <source src="Trailer/league.mp4" type="video/mp4">
        <source src="Trailer/leagueoflegends.mp4" type="video/mp4">
      </video>
      <div class="panel-content">
        <div class="eyebrow">Ascend Hub</div>
        <h1 class="game-name">League of Legends</h1>
        <div class="hint" data-hint>Click to preview</div>
      </div>
      <div class="panel-chrome">Runeterra Selection</div>
    </button>

    <!-- <div class="center-spine" aria-hidden="true"></div> -->

    <button class="panel panel-valorant" id="valoPanel" type="button" data-target="valorant" data-open="indexvalo.html" aria-label="Valorant">
      <div class="panel-fallback"></div>
      <video id="valoTrailer" muted loop playsinline preload="metadata">
        <source src="Trailer/valorant.mp4" type="video/mp4">
        <source src="Trailer/valo.mp4" type="video/mp4">
      </video>
      <div class="panel-content">
        <div class="eyebrow">Ascend Hub</div>
        <h1 class="game-name">Valorant</h1>
        <div class="hint" data-hint>Click to preview</div>
      </div>
      <div class="panel-chrome">Protocol Interface</div>
    </button>
  </main>

<script type="module">
import { supabase } from './supabase-client.js';

const ACCESS_SESSION_KEY='eter-access-session';
const UPLOAD_ACCESS_KEY='eter-upload-access';
const panels=[...document.querySelectorAll('.panel')];
const loginForm=document.getElementById('loginForm');
const loginUser=document.getElementById('loginUser');
const loginPass=document.getElementById('loginPass');
const loginError=document.getElementById('loginError');
let activeTarget=null;
let isUnlocked=false;

async function verifyCode(username,code){
  const { data, error } = await supabase.rpc('verify_profile_code',{
    p_username:username,
    p_code:code
  });
  if(error)throw error;
  return Array.isArray(data)&&data.length?data[0]:null;
}

function readAccess(){
  try{
    return JSON.parse(sessionStorage.getItem(ACCESS_SESSION_KEY)||sessionStorage.getItem(UPLOAD_ACCESS_KEY)||'null');
  }catch{
    return null;
  }
}

function saveAccess(payload){
  sessionStorage.setItem(ACCESS_SESSION_KEY,JSON.stringify(payload));
  sessionStorage.setItem(UPLOAD_ACCESS_KEY,JSON.stringify(payload));
}

function setHint(panel,text){
  const hint=panel.querySelector('[data-hint]');
  if(hint)hint.textContent=text;
}

function setSelection(target){
  activeTarget=target;
  document.body.classList.remove('selection-lol','selection-valorant');
  if(!target){
    panels.forEach(panel=>{
      panel.querySelector('video')?.pause();
      setHint(panel,'Click to preview');
    });
    return;
  }
  document.body.classList.add(`selection-${target}`);
  panels.forEach(panel=>{
    const isActive=panel.dataset.target===target;
    const video=panel.querySelector('video');
    if(video){
      if(isActive){
        const playAttempt=video.play();
        if(playAttempt&&typeof playAttempt.catch==='function')playAttempt.catch(()=>{});
      }else{
        video.pause();
        video.currentTime=0;
      }
    }
    setHint(panel,isActive?'Click to open':'Click to preview');
  });
}

function finishUnlock(immediate=false){
  isUnlocked=true;
  if(immediate){
    document.body.classList.add('app-ready');
    document.body.classList.remove('login-leaving');
    return;
  }
  document.body.classList.add('login-leaving');
  window.setTimeout(()=>{
    document.body.classList.add('app-ready');
    document.body.classList.remove('login-leaving');
  },720);
}

loginForm?.addEventListener('submit',async event=>{
  event.preventDefault();
  const username=loginUser.value.trim();
  const password=loginPass.value.trim();
  const submitButton=loginForm.querySelector('button[type="submit"]');
  if(!username||!password){
    loginError.textContent='Please enter both username and password.';
    return;
  }
  loginError.textContent='';
  if(submitButton){
    submitButton.disabled=true;
    submitButton.textContent='Checking...';
  }
  try{
    const profile=await verifyCode(username,password);
    if(!profile){
      loginError.textContent='Invalid username or access code.';
      return;
    }
    saveAccess({
      username:profile.username,
      code:password,
      avatarUrl:profile.avatar_url||null,
      source:'gateway'
    });
    finishUnlock(false);
  }catch(error){
    loginError.textContent=`Access error: ${error.message}`;
  }finally{
    if(submitButton){
      submitButton.disabled=false;
      submitButton.textContent='Unlock Hub';
    }
  }
});

panels.forEach(panel=>{
  panel.addEventListener('click',()=>{
    if(!isUnlocked)return;
    const target=panel.dataset.target;
    const openUrl=panel.dataset.open;
    if(activeTarget===target){
      window.location.href=openUrl;
      return;
    }
    if(activeTarget&&activeTarget!==target){
      setSelection(null);
      return;
    }
    setSelection(target);
  });
});

window.addEventListener('keydown',event=>{
  if(!isUnlocked)return;
  if(event.key==='Escape')setSelection(null);
});

const existingAccess=readAccess();
if(existingAccess?.username){
  finishUnlock(true);
}
</script>
</body>
</html>
